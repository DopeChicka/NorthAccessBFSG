name: NorthAccessBFSG CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile validation scripts
        run: |
          python -m py_compile \
            04_filter_quality.py \
            05_run_pipeline.py \
            13_city_guard.py \
            14_evidence_gate.py \
            15_run_pipeline_guarded.py

      - name: Run guarded pipeline
        run: python 15_run_pipeline_guarded.py

      - name: Run tests
        run: python -m pytest -q

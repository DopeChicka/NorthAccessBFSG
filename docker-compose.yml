services:
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://northaccess:northaccess@db:5432/northaccessbfsg
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: northaccess
      POSTGRES_PASSWORD: northaccess
      POSTGRES_DB: northaccessbfsg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northaccess -d northaccessbfsg"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

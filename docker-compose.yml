services:
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg2://northaccess:northaccess@db:5432/northaccessbfsg
      ENVIRONMENT: development
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.core.celery worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://northaccess:northaccess@db:5432/northaccessbfsg
      ENVIRONMENT: development
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: northaccess
      POSTGRES_PASSWORD: northaccess
      POSTGRES_DB: northaccessbfsg
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U northaccess -d northaccessbfsg"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
